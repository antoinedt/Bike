name: Build APK

on:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          # Strava credentials are optional; the app builds without them (upload
          # stays disabled). Add repo secrets STRAVA_CLIENT_ID / STRAVA_CLIENT_SECRET
          # to enable uploads. The ORG_GRADLE_PROJECT_ prefix exposes them as Gradle
          # project properties, which app/build.gradle.kts reads.
          ORG_GRADLE_PROJECT_STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          ORG_GRADLE_PROJECT_STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}

      - name: Stage APK
        run: cp app/build/outputs/apk/debug/app-debug.apk bike-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bike-debug-apk
          path: bike-debug.apk
          if-no-files-found: error

      - name: Publish Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Bike debug build ${{ github.run_number }}
          body: |
            Automated debug build of the Bike app.

            `bike-debug.apk` is signed with the standard Android debug key, so it
            installs directly on a device with "install unknown apps" enabled.
            This is a debug build for testing, not a Play Store release.
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: bike-debug.apk
